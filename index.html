<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Colores Grid</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <main class="container">

    <h1>Colores de fondo</h1>
    <h2>Colores</h2>

    <section class="grid">

      <div class="card colors">Colors</div>

      <div class="card black">black</div>
      <div class="card teal">teal</div>
      <div class="card blue">blue</div>
      <div class="card navy">navy</div>

      <div class="card lime">lime</div>
      <div class="card white">white</div>
      <div class="card purple">purple</div>
      <div class="card yellow">yellow</div>

      <div class="card olive">olive</div>
      <div class="card red">red</div>
      <div class="card maroon">maroon</div>
      <div class="card gray">gray</div>

      <div class="card olivedrab">olivedrab</div>
      <div class="card deepskyblue">deep sky blue</div>
      <div class="card fuchsia">fuchsia</div>

      <div class="card green">green</div>

    </section>

  </main>

</body>
</html>
